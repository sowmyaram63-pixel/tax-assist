<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Access Denied</title>
    <style>
        body {
            font-family: system-ui, -apple-system, "Segoe UI", Roboto, sans-serif;
            background: #f5f7fb;
            color: #111827;
            display: grid;
            place-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
        }
        .card {
            background: #fff;
            border: 1px solid #e5e7eb;
            border-radius: 12px;
            box-shadow: 0 8px 30px rgba(0, 0, 0, 0.08);
            max-width: 440px;
            width: 100%;
            padding: 28px;
            text-align: center;
        }
        h1 {
            margin-top: 0;
            margin-bottom: 10px;
        }
        p {
            color: #4b5563;
            line-height: 1.5;
            margin-bottom: 18px;
        }
        a {
            display: inline-block;
            background: #1e40af;
            color: #fff;
            text-decoration: none;
            padding: 10px 16px;
            border-radius: 8px;
            font-weight: 600;
        }
    </style>
</head>
<body>
    <div class="card">
        <h1>403 - Access Denied</h1>
        <p>Your request is missing a valid permission token or you do not have access to this page.</p>
        <a href="/">Back to Home</a>
    </div>
</body>
</html>
